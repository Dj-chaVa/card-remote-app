<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Card Remote</title>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
}

video{
width:90%;
max-width:500px;
margin:10px;
border-radius:10px;
}

button{
padding:12px 20px;
font-size:16px;
margin:10px;
}

#qrcode{
margin:20px;
}

</style>

</head>

<body>

<h1>Card Remote</h1>

<button onclick="createRoom()">ルーム作成</button>
<button onclick="joinRoom()">QR参加</button>
<button onclick="viewerMode()">iPad視聴</button>

<div id="qrcode"></div>

<h2>自分の盤面</h2>
<video id="localVideo" autoplay muted playsinline></video>

<h2>相手の盤面</h2>
<video id="remoteVideo" autoplay playsinline></video>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

let peer
let localStream

function randomID(){
return Math.random().toString(36).substring(2,8)
}

async function startCamera(){

localStream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:true
})

document.getElementById("localVideo").srcObject = localStream

}

async function createRoom(){

await startCamera()

const room = randomID()

const url = location.href + "?room=" + room

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),url)

peer = new Peer(room)

peer.on("call",call=>{

call.answer(localStream)

call.on("stream",remoteStream=>{

document.getElementById("remoteVideo").srcObject = remoteStream

})

})

}

async function joinRoom(){

await startCamera()

const params = new URLSearchParams(location.search)
const room = params.get("room")

peer = new Peer()

peer.on("open",id=>{

const call = peer.call(room,localStream)

call.on("stream",remoteStream=>{

document.getElementById("remoteVideo").srcObject = remoteStream

})

})

}

function viewerMode(){

const params = new URLSearchParams(location.search)
const room = params.get("room")

peer = new Peer()

peer.on("open",id=>{

peer.call(room,new MediaStream())

})

peer.on("call",call=>{

call.answer()

call.on("stream",remoteStream=>{

document.getElementById("remoteVideo").srcObject = remoteStream

})

})

}

</script>

</body>
</html>
